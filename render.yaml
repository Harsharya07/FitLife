# FitLife — Render Blueprint
# One-click deploy: https://dashboard.render.com/select-repo?type=blueprint
# Docs: https://render.com/docs/infrastructure-as-code

services:
  # ── FastAPI backend (Docker) ──────────────────────────────────────────────
  - type: web
    name: fitlife-api
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile.backend
    dockerContext: .
    healthCheckPath: /api/health
    envVars:
      - key: FITLIFE_ENV
        value: production
      - key: SECRET_KEY
        sync: false # Render prompts you on first deploy — use: openssl rand -hex 32
      - key: LLM_PROVIDER
        value: gemini
      - key: GEMINI_API_KEY
        sync: false # Get free key: https://aistudio.google.com/apikey
      - key: GEMINI_MODEL
        value: gemini-2.0-flash
      - key: DATABASE_URL
        value: /app/fitness_site.db
      - key: ADMIN_USERNAME
        value: admin

  # ── React frontend (Static Site) ──────────────────────────────────────────
  - type: web
    name: fitlife
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./frontend/dist
    routes:
      # Proxy API calls to the backend (same-origin for the browser)
      - type: rewrite
        source: /api/*
        destination: https://fitlife-api.onrender.com/api/*
      # React Router — serve index.html for client-side routes
      - type: rewrite
        source: /*
        destination: /index.html
