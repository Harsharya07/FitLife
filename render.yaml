# FitLife — Render Blueprint
# One-click deploy: https://dashboard.render.com/select-repo?type=blueprint
# Docs: https://render.com/docs/infrastructure-as-code

services:
  # ── FastAPI backend (Docker) ──────────────────────────────────────────────
  - type: web
    name: fitlife-api
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile.backend
    dockerContext: .
    healthCheckPath: /api/health
    # Render injects PORT; start_backend.sh binds to it
    dockerCommand: ./start_backend.sh
    envVars:
      - key: FITLIFE_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: LLM_PROVIDER
        value: gemini
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.0-flash-lite
      - key: DATABASE_URL
        value: /app/fitness_site.db
      - key: ADMIN_USERNAME
        value: admin

  # ── React frontend (Static Site) ──────────────────────────────────────────
  - type: web
    name: fitlife
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: NODE_VERSION
        value: "22"
      # Set to your backend URL, e.g. https://fitlife-api.onrender.com (no trailing slash)
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /api/*
        destination: https://fitlife-api.onrender.com/api/*
      - type: rewrite
        source: /*
        destination: /index.html
